<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Liste de Naissance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #fdfaf7; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .card { transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
    </style>
</head>
<body>

    <header class="text-center py-12 px-4">
        <h1 class="text-4xl font-serif text-pink-300 mb-2">La Liste de Bébé</h1>
        <p class="text-gray-600">Bienvenue sur notre liste ! Merci de nous aider à préparer l'arrivée du petit bout.</p>
    </header>

    <main class="max-w-5xl mx-auto px-4 pb-20">
        <div id="gift-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </main>

    <script>
        // MODIFIE TES CADEAUX ICI
        const gifts = [
            {
                name: "Poussette Trio",
                price: "450€",
                image: "https://images.unsplash.com/photo-1591084728795-1149f32d9866?auto=format&fit=crop&w=400",
                url: "https://www.bebe9.com/poussette-trio.html"
            },
            {
                name: "Veilleuse Étoile",
                price: "25€",
                image: "https://images.unsplash.com/photo-1537678122133-3bc810ef85df?auto=format&fit=crop&w=400",
                url: "https://www.amazon.fr/veilleuse-bebe"
            },
            {
                name: "Lot de Pyjamas Coton",
                price: "30€",
                image: "https://images.unsplash.com/photo-1522771930-78848d9293e8?auto=format&fit=crop&w=400",
                url: "https://www.petit-bateau.fr"
            }
        ];

        const container = document.getElementById('gift-container');

        gifts.forEach(gift => {
            const card = `
                <div class="card bg-white rounded-2xl shadow-sm border border-pink-100 overflow-hidden">
                    <img src="${gift.image}" alt="${gift.name}" class="w-full h-48 object-cover">
                    <div class="p-6">
                        <h3 class="text-xl font-semibold text-gray-800">${gift.name}</h3>
                        <p class="text-pink-400 font-bold mb-4">${gift.price}</p>
                        
                        <div class="flex flex-col gap-2">
                            <a href="${gift.url}" target="_blank" class="text-center bg-gray-100 text-gray-700 py-2 rounded-lg hover:bg-gray-200 transition">
                                Voir le produit
                            </a>
                            <button onclick="reserver('${gift.name}')" class="bg-pink-200 text-pink-800 py-2 rounded-lg font-medium hover:bg-pink-300 transition">
                                Je l'offre !
                            </button>
                        </div>
                    </div>
                </div>
            `;
            container.innerHTML += card;
        });

        function reserver(nom) {
            const email = "ton-email@exemple.com"; // REMPLACE PAR TON EMAIL
            const subject = encodeURIComponent(`Je souhaite offrir : ${nom}`);
            const body = encodeURIComponent(`Bonjour, \n\nJe souhaite réserver le cadeau suivant sur votre liste : ${nom}. \n\nDites-moi si c'est toujours disponible !`);
            
            // Ouvre le client mail de l'invité
            window.location.href = `mailto:${email}?subject=${subject}&body=${body}`;
        }
    </script>

</body>
</html>
